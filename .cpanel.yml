# cPanel Git Deployment Configuration
deployment:
  tasks:
    - export PATH=$HOME/.composer/vendor/bin:$PATH
    - /usr/bin/php81 composer.phar install --no-dev --optimize-autoloader
    - /usr/bin/php81 artisan config:cache
    - /usr/bin/php81 artisan route:cache
    - /usr/bin/php81 artisan view:cache
    - /usr/bin/php81 artisan migrate --force
    - /usr/bin/php81 artisan storage:link
    - /usr/bin/php81 artisan cache:clear
  
  directories:
    - storage
    - bootstrap/cache
  
  files:
    - .env
    - .env.production

  permissions:
    storage: 755
    bootstrap/cache: 755